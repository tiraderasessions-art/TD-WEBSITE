<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Tiradera Records</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Tiradera Records · Colectivo de productores y artista independiente desde Puerto Rico.">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      /* Pure white background */
      background-color: #ffffff;
      /* Solid black text for high contrast */
      color: #000000;
      line-height: 1.6;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page {
      max-width: 960px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }
    header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 40px;
    }
    
    .logo img {
      /* Adjust this width if the logo feels too big or small */
      max-width: 280px; 
      height: auto;
      display: block;
    }
    
    nav {
      display: flex;
      gap: 20px;
      font-size: 0.95rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    nav a {
      opacity: 1;
      border-bottom: 2px solid transparent;
    }
    nav a:hover {
      text-decoration: none;
      border-bottom: 2px solid #000;
    }

    .hero {
      margin-bottom: 50px;
    }
    .hero p {
      max-width: 600px;
      font-size: 1.1rem;
      font-weight: 500;
    }

    .section-title {
      font-size: 1.2rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      border-bottom: 3px solid #000;
      display: inline-block;
      margin: 40px 0 24px;
      padding-bottom: 4px;
    }

    .releases {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 24px;
      margin-bottom: 40px;
    }
    .release-card {
      /* Solid black border to match logo style */
      border: 2px solid #000;
      border-radius: 0px; 
      padding: 20px;
      background: #fff;
      transition: transform 0.2s ease;
    }
    .release-card:hover {
      transform: translateY(-4px);
      box-shadow: 4px 4px 0px #000; /* Retro shadow effect */
    }
    
    .release-type {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      background: #000;
      color: #fff;
      display: inline-block;
      padding: 2px 8px;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .release-title {
      font-size: 1.1rem;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .release-artist {
      font-size: 0.95rem;
      font-weight: 500;
      margin-bottom: 16px;
      color: #444;
    }
    .release-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .pill-link {
      display: inline-block;
      padding: 6px 16px;
      background: #000;
      color: #fff;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 1px solid #000;
      border-radius: 0px;
    }
    .pill-link:hover {
      background: #fff;
      color: #000;
      text-decoration: none;
    }

    .grid-two {
      display: grid;
      grid-template-columns: minmax(0, 1.2fr) minmax(0, 1fr);
      gap: 40px;
      margin-bottom: 40px;
    }
    @media (max-width: 720px) {
      .grid-two {
        grid-template-columns: 1fr;
      }
    }

    .credits-list {
      list-style: none;
      font-size: 1rem;
    }
